# GitHub Action for generating a contribution graph with a snake eating your contributions.

name: Generate Snake
permissions:
  contents: write

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - uses: actions/checkout@v3

      # Generate Snake (Light Mode)
      - name: Generate Snake Light
        uses: Platane/svg@v3
        with:
          github_user_name: swayammehta5
          outputs: |
            dist/github-snake-light.svg

      # Generate Snake (Dark Mode)
      - name: Generate Snake Dark
        uses: Platane/svg@v3
        with:
          github_user_name: swayammehta5
          outputs: |
            dist/github-snake-dark.svg

      # Show status for debugging
      - run: git status

      # Push changes back to master
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: true

      # Deploy to GitHub Pages (output branch)
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
